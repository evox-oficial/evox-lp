<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVOX | Modelo 09</title>
    <link rel="stylesheet" href="../../css/style.css">

<body class="product-page" data-model-name="MODELO 09">
    <main class="product-page-content" style="padding-inline: 6%;">

            <div class="product-gallery">
                <a href="../../index.html#modelos" class="back-link">
                    <i class="fa-solid fa-arrow-left"></i> Voltar aos modelos
                </a>

                <div class="main-image-container">

                <div class="thumbnail-grid"></div>
            </div>

            <div class="product-info">
                <h1 data-model-title>Modelo 09</h1>
                <p style="color: var(--text-muted); line-height: 1.8; font-size: 1.05rem;">
                    Slot reservado para um futuro modelo EVOX. Ao adicionar imagens em <strong>img</strong>,
                    esta pagina passa a exibir automaticamente toda a galeria da pasta.
                </p>
            </div>
        </div>

    <script src="../../js/model-gallery-manifest.js?v=2"></script>
