<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVOX | Modelo 05</title>
    <link rel="stylesheet" href="../../css/style.css?v=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,600;0,700;0,800;1,700;1,800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,600;0,700;0,800;1,700;1,800&display=swap"></noscript>
</head>
<body class="product-page" data-model-name="MODELO 05">
    <main class="product-page-content" style="padding-inline: 6%;">
        <div class="product-detail">
            <div class="product-gallery">
                <a href="/#modelos" class="back-link">
                    <i class="fa-solid fa-arrow-left"></i> Voltar aos modelos
                </a>

                <div class="main-image-container">
                    <img src="img/capa.jpg" alt="EVOX Modelo 05" class="main-image" id="mainImage">
                </div>

                <div class="thumbnail-grid"></div>
            </div>

            <div class="product-info">
                <h1 data-model-title>Modelo 05</h1>
                <p style="color: var(--text-muted); line-height: 1.8; font-size: 1.05rem;">
                    Slot reservado para um futuro modelo EVOX. Ao adicionar imagens em <strong>img</strong>,
                    esta pagina passa a exibir automaticamente toda a galeria da pasta.
                </p>
            </div>
        </div>
    </main>

    <script src="../../js/model-gallery-manifest.js?v=2"></script>
    <script src="../../js/model-gallery.js?v=2"></script>
</body>
</html>
